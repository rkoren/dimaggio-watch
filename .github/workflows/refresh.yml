# Refreshes the hitting-streak data hourly.
# Runs the data script, commits site/data/streaks.json when the numbers change,
# and the resulting push auto-triggers an Amplify deploy.
name: Refresh streak data

on:
  schedule:
    - cron: "0 * * * *" # top of every hour (UTC)
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

# Allow the workflow to commit the regenerated data file.
permissions:
  contents: write

# If a run is still going when the next hour fires, let it finish.
concurrency:
  group: refresh-streaks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build streak data
        run: node scripts/build-data.mjs

      - name: Commit if the streaks changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/streaks.json
          if git diff --staged --quiet; then
            echo "No streak changes this hour."
          else
            git commit -m "data: refresh hitting streaks ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
