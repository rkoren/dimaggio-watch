# CloudFormation stack for the AWS-native data refresh pipeline.
#
#   EventBridge quick rule (every 2 min) ─┐
#                                         ├-> Lambda (build streaks) -> S3
#   EventBridge full rule  (every 3 h)  ──┘                              ^
#                                                site polls streaks.json │
#
# The full rule rescans the whole league and refreshes the watchlist
# baseline; the quick rule rescans only the top ~40 streaks (see
# lambda/handler.mjs). Deploy with infra/deploy.sh. The site itself stays
# on Amplify Hosting; this stack only owns the data path, so data updates
# never require a site rebuild.
AWSTemplateFormatVersion: "2010-09-09"
Description: DiMaggio Watch - streak data refresh (S3 + Lambda + EventBridge)

Parameters:
  CodeBucket:
    Type: String
    Description: S3 bucket holding the packaged Lambda code zip
  CodeKey:
    Type: String
    Description: S3 key of the packaged Lambda code zip (content-hashed)
  QuickRate:
    Type: String
    Default: cron(0/2 * * * ? *) # every even minute
    Description: Schedule for the quick (watchlist-only) refresh
  LiveRate:
    Type: String
    Default: rate(1 minute)
    Description: Schedule for the live-game watcher (exits fast when idle)
  FullRate:
    Type: String
    # Minute 1 past every 3rd hour — an odd minute, so it never lands on the
    # quick rule's even-minute grid and races it publishing streaks.json.
    Default: cron(1 0/3 * * ? *)
    Description: Schedule for the full-league rescan

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub dimaggio-watch-data-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true # policy-based public read only; no ACLs
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["*"] # public data; site + local dev both fetch it
            AllowedHeaders: ["*"]
            MaxAge: 300

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadData
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub ${DataBucket.Arn}/*

  RefreshFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dimaggio-watch-refresh-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: write-data-bucket
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject] # Get: quick scan reads state/full-scan.json
                Resource: !Sub ${DataBucket.Arn}/*

  RefreshFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: dimaggio-watch-refresh
      Description: Rebuilds MLB hitting-streak data and publishes it to S3
      Runtime: nodejs22.x
      Architectures: [arm64]
      Handler: handler.handler
      Role: !GetAtt RefreshFunctionRole.Arn
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      MemorySize: 512
      Timeout: 600 # full-league scan takes a couple of minutes
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucket
          WATCH_COUNT: "40"

  QuickSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: dimaggio-watch-refresh-quick
      Description: Watchlist-only streak refresh (top streaks, ~40 API calls)
      ScheduleExpression: !Ref QuickRate
      State: ENABLED
      Targets:
        - Id: refresh-lambda-quick
          Arn: !GetAtt RefreshFunction.Arn
          Input: '{"mode": "quick"}'

  QuickSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RefreshFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt QuickSchedule.Arn

  FullSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: dimaggio-watch-refresh-full
      Description: Full-league rescan; rebuilds the watchlist baseline
      ScheduleExpression: !Ref FullRate
      State: ENABLED
      Targets:
        - Id: refresh-lambda-full
          Arn: !GetAtt RefreshFunction.Arn
          Input: '{"mode": "full"}'

  FullSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RefreshFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FullSchedule.Arn

  LiveSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: dimaggio-watch-refresh-live
      Description: Live-game watcher; publishes within seconds of a watched at-bat
      ScheduleExpression: !Ref LiveRate
      State: ENABLED
      Targets:
        - Id: refresh-lambda-live
          Arn: !GetAtt RefreshFunction.Arn
          Input: '{"mode": "live"}'

  LiveSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RefreshFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LiveSchedule.Arn

Outputs:
  DataUrl:
    Description: Public URL of the live streaks payload
    Value: !Sub https://${DataBucket.RegionalDomainName}/streaks.json
  FunctionName:
    Value: !Ref RefreshFunction
