# AWS Amplify Hosting build spec.
# Live data is published to S3 by the refresher Lambda (see infra/), so site
# deploys don't depend on it. build:data only refreshes the bundled fallback
# copy; if the MLB API hiccups, ship the committed fallback rather than fail.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
    build:
      commands:
        - npm run build:data || echo "data build failed; shipping committed fallback copy"
  artifacts:
    baseDirectory: site
    files:
      - "**/*"
  cache:
    paths: []
