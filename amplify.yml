# AWS Amplify Hosting build spec.
# The data script runs at build time, so every deploy ships fresh streaks.
# If the script fails, the build fails (no stale data is published).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
    build:
      commands:
        - npm run build:data
  artifacts:
    baseDirectory: site
    files:
      - "**/*"
  cache:
    paths: []
